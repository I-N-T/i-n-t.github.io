<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重置密码 — 竞赛报名系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink:#1a1a2e; --gold:#c9a84c; --cream:#f5f0e8; --cream-dark:#ede5d4; --white:#fdfcf9; --muted:#7a7060; --red:#9b2335; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans SC',sans-serif; background:var(--cream); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:var(--white); border:1px solid rgba(201,168,76,0.3); box-shadow:0 8px 40px rgba(26,26,46,0.15); width:100%; max-width:420px; margin:24px; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,var(--gold),#e8c97a,var(--gold)); }
  .inner { padding:36px; }
  .badge { display:inline-block; border:1.5px solid var(--gold); color:var(--gold); font-size:11px; letter-spacing:3px; padding:4px 14px; margin-bottom:20px; font-family:'Noto Serif SC',serif; }
  h1 { font-family:'Noto Serif SC',serif; font-size:22px; color:var(--ink); margin-bottom:8px; }
  p.sub { font-size:13px; color:var(--muted); margin-bottom:28px; line-height:1.6; }
  .form-group { margin-bottom:16px; }
  label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  input { width:100%; padding:11px 14px; border:1.5px solid var(--cream-dark); background:var(--white); font-family:'Noto Sans SC',sans-serif; font-size:14px; color:var(--ink); outline:none; transition:border-color 0.2s; }
  input:focus { border-color:var(--gold); }
  .btn { width:100%; padding:14px; background:var(--ink); color:var(--cream); border:none; font-family:'Noto Serif SC',serif; font-size:15px; letter-spacing:2px; cursor:pointer; margin-top:8px; transition:background 0.2s; }
  .btn:hover { background:#2d2d4e; }
  .btn:disabled { opacity:0.6; cursor:not-allowed; }
  /* 密码框容器与眼睛按钮 */
  .pwd-wrap { position: relative; }
  .pwd-wrap input { padding-right: 14px; transition: padding-right 0.15s; }
  .pwd-wrap:hover input { padding-right: 42px; }
  .pwd-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:0; color:#7a7060; display:flex; align-items:center; opacity:0; pointer-events:none; transition:opacity 0.15s, color 0.2s; }
  .pwd-wrap:hover .pwd-eye,
  .pwd-wrap.locked  .pwd-eye { opacity:1; pointer-events:auto; }
  .pwd-eye:hover { color:#1a1a2e; }
  .notice { padding:14px; font-size:13px; border-left:3px solid; margin-bottom:16px; display:none; }
  .notice.success { background:#f0f7f0; border-color:#4a9a5a; color:#2d6b3a; }
  .notice.error   { background:#fdf0f0; border-color:var(--red); color:var(--red); }
  .back { display:block; text-align:center; margin-top:20px; font-size:12px; color:var(--muted); text-decoration:underline; cursor:pointer; }
</style>
</head>
<body>
<div class="card">
  <div class="inner">
    <div class="badge">密码重置</div>
    <h1>设置新密码</h1>
    <p class="sub">请输入您的新密码，重置后所有已登录设备将退出。</p>

    <div id="notice" class="notice"></div>

    <div id="form">
      <div class="form-group">
        <label>新密码</label>
        <div class="pwd-wrap">
          <input type="password" id="pwd1" placeholder="至少6位">
          <button type="button" class="pwd-eye" onmouseenter="showPwd('pwd1')" onmouseleave="hidePwd('pwd1')" onclick="togglePwd('pwd1', this)" title="悬停预览 / 点击锁定显示">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <div class="pwd-wrap">
          <input type="password" id="pwd2" placeholder="再次输入新密码">
          <button type="button" class="pwd-eye" onmouseenter="showPwd('pwd2')" onmouseleave="hidePwd('pwd2')" onclick="togglePwd('pwd2', this)" title="悬停预览 / 点击锁定显示">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" id="submitBtn" onclick="doReset()">确 认 重 置</button>
    </div>

    <a class="back" href="index.html">← 返回登录页</a>
  </div>
</div>

<script>
  const pwdState = {};
  function initPwd(id) { if (!pwdState[id]) pwdState[id] = { locked: false }; }
  function showPwd(id) { initPwd(id); if (!pwdState[id].locked) document.getElementById(id).type = 'text'; }
  function hidePwd(id) { initPwd(id); if (!pwdState[id].locked) document.getElementById(id).type = 'password'; }
  function togglePwd(id, btn) {
    initPwd(id);
    const input = document.getElementById(id);
    pwdState[id].locked = !pwdState[id].locked;
    input.type = pwdState[id].locked ? 'text' : 'password';
    btn.closest('.pwd-wrap').classList.toggle('locked', pwdState[id].locked);
    const eyeOpen = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeOff  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    btn.innerHTML = pwdState[id].locked ? eyeOff : eyeOpen;
  }

  const API = 'http://localhost:8000';
  const token = new URLSearchParams(location.search).get('token');

  if (!token) {
    showNotice('链接无效，请重新申请重置密码。', 'error');
    document.getElementById('form').style.display = 'none';
  }

  function showNotice(msg, type) {
    const n = document.getElementById('notice');
    n.textContent = msg; n.className = 'notice ' + type;
    n.style.display = 'block';
  }

  async function doReset() {
    const pwd1 = document.getElementById('pwd1').value;
    const pwd2 = document.getElementById('pwd2').value;
    if (!pwd1 || !pwd2) { showNotice('请填写两次密码', 'error'); return; }
    if (pwd1.length < 6) { showNotice('密码至少6位', 'error'); return; }
    if (pwd1 !== pwd2)   { showNotice('两次密码不一致', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '请稍候…';

    try {
      const res = await fetch(API + '/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: pwd1 })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '重置失败');
      showNotice('密码重置成功！3秒后跳转登录页…', 'success');
      document.getElementById('form').style.display = 'none';
      setTimeout(() => location.href = 'index.html', 3000);
    } catch(e) {
      showNotice(e.message, 'error');
      btn.disabled = false; btn.textContent = '确 认 重 置';
    }
  }
</script>
</body>
</html>
