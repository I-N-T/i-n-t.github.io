<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYES 2026 抢课系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            color: #667eea;
            font-size: 28px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info span {
            color: #333;
            font-weight: 500;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-secondary {
            background: #764ba2;
            color: white;
        }
        .btn-secondary:hover {
            background: #653d91;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 25px;
            background: #f0f0f0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .course-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .course-card:hover {
            transform: translateY(-5px);
        }
        .course-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .course-card p {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .course-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .key-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin: 15px 0;
        }
        .key-display code {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
            letter-spacing: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        .hidden {
            display: none;
        }
        .nav-tabs {
            display: flex;
            gap: 5px;
            background: #f5f5f5;
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .nav-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
        }
        .nav-tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AYES 2026 抢课系统</h1>
            <div class="user-info" id="userInfo">
                <span id="welcomeText"></span>
                <button class="btn btn-primary" id="loginBtn" onclick="showModal('loginModal')">登录</button>
                <button class="btn btn-secondary" onclick="showModal('registerModal')">注册</button>
            </div>
        </header>

        <div id="messageBox"></div>

        <div id="mainContent">
            <div class="card">
                <h2>报名流程</h2>
                <p style="color: #666; margin-bottom: 15px;">请按照以下步骤完成报名：</p>
                <ol style="color: #666; line-height: 2;">
                    <li><strong>第一步：</strong> 点击"申请密钥"按钮，获取注册密钥</li>
                    <li><strong>第二步：</strong> 联系组委支付报名费，获取密钥</li>
                    <li><strong>第三步：</strong> 使用密钥注册账号（选择"选手"或"组委"角色）</li>
                    <li><strong>第四步：</strong> 登录后开始抢课！</li>
                </ol>
                <button class="btn btn-primary" onclick="applyKey()">申请密钥</button>
                <div id="keyResult" class="hidden" style="margin-top: 20px;">
                    <div class="key-display">
                        您的密钥：<code id="generatedKey"></code>
                    </div>
                    <p style="color: #666; font-size: 14px;">请支付报名费后使用此密钥注册。如密钥已过期，请重新申请。</p>
                </div>
            </div>

            <div class="card">
                <h2>可选课程</h2>
                <div class="course-grid" id="courseList"></div>
            </div>

            <div class="card" id="myCoursesCard" style="display: none;">
                <h2>我的选课</h2>
                <div id="myCourseList"></div>
            </div>

            <div class="card" id="adminPanel" style="display: none;">
                <h2>组委管理面板</h2>
                <div class="nav-tabs">
                    <button class="nav-tab active" onclick="showAdminTab('users')">用户管理</button>
                    <button class="nav-tab" onclick="showAdminTab('keys')">密钥管理</button>
                </div>
                <div id="adminUsers"></div>
                <div id="adminKeys" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="hideModal('loginModal')">取消</button>
                <button class="btn btn-primary" onclick="login()">登录</button>
            </div>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h2>注册</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword">
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="regRole">
                    <option value="选手">选手</option>
                    <option value="组委">组委</option>
                </select>
            </div>
            <div class="form-group">
                <label>注册密钥</label>
                <input type="text" id="regKey" placeholder="请输入您获得的密钥">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="hideModal('registerModal')">取消</button>
                <button class="btn btn-primary" onclick="register()">注册</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        async function checkSession() {
            const res = await fetch('/api/session');
            const data = await res.json();
            if (data.loggedIn) {
                currentUser = data.user;
                updateUI();
            }
            loadCourses();
        }

        function updateUI() {
            const loginBtn = document.getElementById('loginBtn');
            const welcomeText = document.getElementById('welcomeText');
            const myCoursesCard = document.getElementById('myCoursesCard');
            const adminPanel = document.getElementById('adminPanel');

            if (currentUser) {
                loginBtn.textContent = '退出';
                loginBtn.onclick = logout;
                welcomeText.textContent = `欢迎，${currentUser.username} (${currentUser.role})`;
                myCoursesCard.style.display = 'block';
                if (currentUser.role === '组委') {
                    adminPanel.style.display = 'block';
                    loadAdminData();
                }
                loadMyCourses();
            } else {
                loginBtn.textContent = '登录';
                loginBtn.onclick = () => showModal('loginModal');
                welcomeText.textContent = '';
                myCoursesCard.style.display = 'none';
                adminPanel.style.display = 'none';
            }
        }

        async function loadCourses() {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const container = document.getElementById('courseList');
            container.innerHTML = courses.map(course => `
                <div class="course-card">
                    <h3>${course.name}</h3>
                    <p>${course.description || '暂无描述'}</p>
                    <div class="course-status">
                        <span>容量: ${course.enrolled}/${course.capacity}</span>
                        <span>${course.enrolled >= course.capacity ? '已满' : '可选'}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${(course.enrolled / course.capacity) * 100}%"></div>
                    </div>
                    <button class="btn ${course.enrolled >= course.capacity ? 'btn-secondary' : 'btn-success'}" 
                            onclick="enrollCourse(${course.id})"
                            ${!currentUser || course.enrolled >= course.capacity ? 'disabled' : ''}>
                        ${course.enrolled >= course.capacity ? '已满' : '选课'}
                    </button>
                </div>
            `).join('');
        }

        async function loadMyCourses() {
            if (!currentUser) return;
            const res = await fetch('/api/my-courses');
            const courses = await res.json();
            const container = document.getElementById('myCourseList');
            if (courses.length === 0) {
                container.innerHTML = '<p style="color: #666;">您还未选修任何课程</p>';
            } else {
                container.innerHTML = courses.map(course => `
                    <div class="course-card" style="margin-bottom: 15px;">
                        <h3>${course.name}</h3>
                        <p>${course.description || '暂无描述'}</p>
                        <p style="font-size: 12px; color: #999;">选课时间: ${new Date(course.enrolled_at).toLocaleString()}</p>
                        <button class="btn btn-danger" onclick="cancelEnroll(${course.id})">退课</button>
                    </div>
                `).join('');
            }
        }

        async function enrollCourse(courseId) {
            if (!currentUser) {
                showMessage('请先登录', 'error');
                return;
            }
            const res = await fetch('/api/enroll', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ courseId })
            });
            const data = await res.json();
            if (data.success) {
                showMessage(data.message, 'success');
                loadCourses();
                loadMyCourses();
            } else {
                showMessage(data.error, 'error');
            }
        }

        async function cancelEnroll(courseId) {
            if (!currentUser) return;
            const res = await fetch('/api/cancel-enroll', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ courseId })
            });
            const data = await res.json();
            if (data.success) {
                showMessage(data.message, 'success');
                loadCourses();
                loadMyCourses();
            } else {
                showMessage(data.error, 'error');
            }
        }

        async function applyKey() {
            const username = prompt('请输入您想要的用户名（将用于注册）：');
            if (!username) return;
            const res = await fetch('/api/apply-key', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('generatedKey').textContent = data.key;
                document.getElementById('keyResult').classList.remove('hidden');
                showMessage('密钥生成成功，请支付报名费后使用', 'success');
            } else {
                showMessage(data.error, 'error');
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const key = document.getElementById('regKey').value;

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role, key })
            });
            const data = await res.json();
            if (data.success) {
                showMessage('注册成功，请登录', 'success');
                hideModal('registerModal');
                clearRegisterForm();
            } else {
                showMessage(data.error, 'error');
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = data.user;
                showMessage('登录成功', 'success');
                hideModal('loginModal');
                clearLoginForm();
                updateUI();
            } else {
                showMessage(data.error, 'error');
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            currentUser = null;
            showMessage('已退出登录', 'success');
            updateUI();
        }

        async function loadAdminData() {
            await loadAdminUsers();
            await loadAdminKeys();
        }

        async function loadAdminUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            document.getElementById('adminUsers').innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>选课数</th>
                            <th>注册时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(u => `
                            <tr>
                                <td>${u.id}</td>
                                <td>${u.username}</td>
                                <td>${u.role}</td>
                                <td>${u.course_count}</td>
                                <td>${new Date(u.created_at).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function loadAdminKeys() {
            const res = await fetch('/api/admin/keys');
            const keys = await res.json();
            document.getElementById('adminKeys').innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>密钥</th>
                            <th>状态</th>
                            <th>使用者</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${keys.map(k => `
                            <tr>
                                <td>${k.id}</td>
                                <td><code>${k.key_text}</code></td>
                                <td>${k.used ? '已使用' : '可用'}</td>
                                <td>${k.username || '-'}</td>
                                <td>${new Date(k.created_at).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function showAdminTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'users') {
                document.getElementById('adminUsers').style.display = 'block';
                document.getElementById('adminKeys').style.display = 'none';
            } else {
                document.getElementById('adminUsers').style.display = 'none';
                document.getElementById('adminKeys').style.display = 'block';
            }
        }

        function showModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function hideModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function clearLoginForm() {
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function clearRegisterForm() {
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regRole').value = '选手';
            document.getElementById('regKey').value = '';
        }

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => box.innerHTML = '', 3000);
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) hideModal(modal.id);
            });
        });

        checkSession();
    </script>
</body>
</html>
